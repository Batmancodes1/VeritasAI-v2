<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 360px;
        font-family: "Segoe UI", sans-serif;
        background: #080c10;
        color: #c9d4e0;
        padding: 18px;
      }
      .logo {
        font-size: 17px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #4d9fff, #6b8cff);
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 8px;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-dash {
        background: #1e2d3d;
        margin-top: 10px;
        transition: background 0.2s;
      }
      .btn-dash:hover {
        background: #2a3f57;
      }
      .status {
        font-size: 11px;
        color: #6b7f94;
        text-align: center;
        min-height: 16px;
        margin-bottom: 8px;
        font-family: monospace;
      }
      .result {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="logo">🔍 VeritasAI</div>
    <button class="btn" id="btn">Verify Current Page</button>
    <div id="status" class="status"></div>
    <div id="result" class="result"></div>

    <script src="popup.js"></script>
  </body>
</html>
